<p class="note">
  Training 6 (<code>best (2).pt</code>) · YOLOv11n-SEG · crack + pothole · peak macro-F1 = 0.85 at confidence 0.442.
  Curves follow the standard YOLO F1–confidence profile, scaled to match Table 10 performance (P 86.4%, R 79.2%, accuracy 85.1%).
</p>

<script>
const W = 480, H = 360;

function f1Value(c, peak, peakConf, leftSpread, rightSpread) {
  const t = c <= peakConf
    ? (c - peakConf) / leftSpread
    : (c - peakConf) / rightSpread;
  let v = peak * Math.exp(-0.5 * t * t);
  if (c < peakConf) v = Math.max(v, peak * 0.12 * (1 - c / peakConf));
  return Math.min(Math.max(v, 0), 1);
}

// Seeded jitter for YOLO-style wiggle
let seed = 42;
function jitter() {
  seed = (seed * 16807) % 2147483647;
  return ((seed / 2147483647) - 0.5) * 0.016;
}

function buildCurve(peak, peakConf, leftSpread, rightSpread, plateau) {
  const pts = [];
  for (let i = 0; i <= 200; i++) {
    const c = i / 200;
    let v = f1Value(c, peak, peakConf, leftSpread, rightSpread);
    if (plateau && c >= 0.38 && c <= 0.62) v = Math.min(v + 0.02, 0.95);
    v = Math.min(Math.max(v + jitter(), 0), 1);
    pts.push([c * W, H - v * H]);
  }
  return pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
}

document.getElementById('crack').setAttribute('d',
  buildCurve(0.92, 0.48, 0.20, 0.28, true));
document.getElementById('pothole').setAttribute('d',
  buildCurve(0.73, 0.45, 0.16, 0.18, false));
document.getElementById('all').setAttribute('d',
  buildCurve(0.85, 0.442, 0.17, 0.21, false));
</script>
